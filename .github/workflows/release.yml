name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build and release mod JAR
        run: ./gradlew --no-daemon --stacktrace jar publishMavenJavaPublicationToGithubPackagesRepository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create JAR checksum
        if: github.event_name == 'release'
        shell: bash
        run: |
          shopt -s nullglob
          jars=(build/libs/*.jar)
          if (( ${#jars[@]} != 1 )); then
            echo "Expected exactly one mod JAR in build/libs, found ${#jars[@]}." >&2
            exit 1
          fi

          jar_name="$(basename "${jars[0]}")"
          cd build/libs
          sha256sum "$jar_name" > "$jar_name.sha256"

      - name: Add mod JAR and checksum to release
        if: github.event_name == 'release'
        shell: bash
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            build/libs/*.jar \
            build/libs/*.jar.sha256 \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
