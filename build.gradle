plugins {
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
    id 'jacoco'
    id 'net.minecraftforge.gradle' version '[6.0,6.2)'
    id 'com.modrinth.minotaur' version '2.+'
    id 'org.spongepowered.mixin' version '0.7.+'
}

version = System.getenv("MOD_VERSION") ?: mod_version
group = mod_group_id

base {
    archivesName = "${mod_id}-forge"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

mixin {
    add sourceSets.main, "ic2r.refmap.json"
    config "ic2r.mixins.json"
}

println "Java: ${System.getProperty 'java.version'}, JVM: ${System.getProperty 'java.vm.version'} (${System.getProperty 'java.vendor'}), Arch: ${System.getProperty 'os.arch'}"

def devAddons = (findProperty('dev_addons') ?: '')
        .toString()
        .split(',')
        .collect { it.trim() }
        .findAll { !it.isEmpty() }

def resolvedDevAddons = devAddons.findAll { addon ->
    def addonProject = findProject(":$addon")
    if (addonProject == null) {
        logger.lifecycle("Dev addon '$addon' not found in addons/, skipping.")
        return false
    }
    true
}

resolvedDevAddons.each { addon ->
    evaluationDependsOn(":$addon")
}

static def resolveAddonModId(addonProject) {
    def propsFile = addonProject.file('gradle.properties')
    if (!propsFile.isFile()) {
        throw new GradleException("Cannot determine mod id for dev addon '${addonProject.name}': gradle.properties not found.")
    }

    def props = new Properties()
    propsFile.withInputStream { props.load(it) }

    def modId = props.getProperty('mod_id')
    if (modId != null && !modId.trim().isEmpty()) {
        return modId.trim()
    }

    def modIdEntry = props.find { key, _ -> key.toString().endsWith('_mod_id') }
    if (modIdEntry != null) {
        return modIdEntry.value.toString().trim()
    }

    throw new GradleException("Cannot determine mod id for dev addon '${addonProject.name}'. " +
            'Set mod_id or *_mod_id in the addon gradle.properties.')
}

sourceSets.main.resources { srcDir 'src/generated/resources' }

minecraft {
    mappings channel: mapping_channel, version: mapping_version
    copyIdeResources = true

    runs {
        configureEach {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            mods {
                "${mod_id}" {
                    source sourceSets.main
                }
                resolvedDevAddons.each { addon ->
                    def addonProject = project(":$addon")
                    create(resolveAddonModId(addonProject)) {
                        source addonProject.sourceSets.main
                    }
                }
            }
        }
        client {
            property 'forge.enabledGameTestNamespaces', mod_id
        }
        server {
            property 'forge.enabledGameTestNamespaces', mod_id
            args '--nogui'
        }
        gameTestServer {
            property 'forge.enabledGameTestNamespaces', mod_id
        }
        data {
            workingDirectory project.file('run')
            args '--mod', mod_id, '--all', '--output', file('src/generated/resources/'), '--existing', file('src/main/resources/')
        }
    }
}

repositories {
    mavenCentral()
    maven { url = "https://maven.blamejared.com/" }
    maven { url = "https://api.modrinth.com/maven" }
}

dependencies {
    minecraft "net.minecraftforge:forge:${minecraft_version}-${forge_version}"
    
    // JEI
    compileOnly "mezz.jei:jei-1.20.1-forge-api:${jei_version}"
    runtimeOnly fg.deobf("mezz.jei:jei-1.20.1-forge:${jei_version}")

    // AE2
    compileOnly fg.deobf("maven.modrinth:ae2:7KVs6HMQ")
    // compileOnly "org.appliedenergistics:appliedenergistics2:${ae2_version}:api"

    // Jade
    compileOnly "maven.modrinth:jade:${jade_version}+forge"
    runtimeOnly fg.deobf("maven.modrinth:jade:${jade_version}+forge")

    // Unit tests
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
}

reobf {
}

tasks.named('processResources', ProcessResources).configure {
    var replaceProperties = [
            minecraft_version   : minecraft_version, minecraft_version_range: minecraft_version_range,
            forge_version       : forge_version, forge_version_range: forge_version_range,
            loader_version_range: loader_version_range,
            mod_id              : mod_id, mod_name: mod_name, mod_license: mod_license, mod_version: mod_version,
            mod_authors         : mod_authors, mod_description: mod_description,
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/mods.toml', 'pack.mcmeta']) {
        expand replaceProperties + [project: project]
    }
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            artifact jar
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

tasks.named('test', Test).configure {
    useJUnitPlatform()
}

jacoco {
    toolVersion = '0.8.11'
}

tasks.named('jacocoTestReport', JacocoReport).configure {
    dependsOn tasks.named('test')
    reports {
        xml.required = true
        html.required = true
    }
}

tasks.register('syncVersion') {
    description = 'Sync mod_version to release.md and README.md'
    group = 'versioning'

    doLast {
        def versionPattern = /^20\.1\.(\d+)$/
        
        def propsFile = file('gradle.properties')
        def props = new Properties()
        propsFile.withInputStream { props.load(it) }
        def currentVersion = props['mod_version']

        def matcher = currentVersion =~ versionPattern
        if (!matcher) {
            throw new GradleException("Incorrect mod version: $currentVersion, expected: 20.1.xxx")
        }
        def currentXxx = matcher[0][1] as int
        
        def versionFile = file('build/syncVersion/lastVersion.txt')
        def lastXxx = -1
        def lastVersion = 'None'
        if (versionFile.exists()) {
            lastVersion = versionFile.text.trim()
            def lastMatcher = lastVersion =~ versionPattern
            if (lastMatcher) {
                lastXxx = lastMatcher[0][1] as int
            }
        }
        
        if (currentXxx <= lastXxx) {
            def lineNum = 1
            propsFile.eachLine { line ->
                if (line.startsWith('mod_version=')) {
                    throw new GradleException("gradle.properties:${lineNum}: Current version is ${currentVersion}, but last synced version is ${lastVersion}")
                }
                lineNum++
            }
            return
        }

        versionFile.parentFile.mkdirs()
        versionFile.text = currentVersion
        println "syncVersion: Version has been recorded as $currentVersion"
        
        def releaseFile = file('release.md')
        if (releaseFile.exists()) {
            def releaseLines = releaseFile.readLines()
            releaseLines[0] = "# $currentVersion"
            releaseFile.text = releaseLines.join('\n') + '\n'
            println "syncVersion: release.md title has been updated to # $currentVersion"
        } else {
            println "syncVersion: release.md not found, skipping"
        }
        
        def readmeFile = file('README.md')
        if (readmeFile.exists()) {
            def readmeText = readmeFile.text
            def shieldsVersion = currentVersion.replace('-', '--')
            def badgePattern = ~/<img src="https:\/\/img\.shields\.io\/badge\/Version-[^"]+" alt="Version [^"]*">/
            def newBadge = "<img src=\"https://img.shields.io/badge/Version-${shieldsVersion}-blue\" alt=\"Version ${currentVersion}\">"
            if (readmeText.find(badgePattern)) {
                readmeText = readmeText.replaceAll(badgePattern, newBadge)
                readmeFile.text = readmeText
                println "syncVersion: README.md Version badge has been updated"
            } else {
                println "syncVersion: Version badge not found in README.md, skipping"
            }
        } else {
            println "syncVersion: README.md not found, skipping"
        }

        println "syncVersion: Sync completed ($currentVersion)"
    }
}
